name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2

      - name: Install frontend deps
        run: npm ci

      - name: Download sidecars (macOS universal)
        run: bash scripts/download-sidecars-ci.sh universal-apple-darwin

      - name: Run Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml -- --test-threads=1

      - name: Verify sidecar files exist
        run: |
          test -f src-tauri/binaries/yt-dlp-aarch64-apple-darwin   || { echo "MISSING: yt-dlp-aarch64-apple-darwin"; exit 1; }
          test -f src-tauri/binaries/yt-dlp-x86_64-apple-darwin    || { echo "MISSING: yt-dlp-x86_64-apple-darwin"; exit 1; }
          test -f src-tauri/binaries/ffmpeg-aarch64-apple-darwin    || { echo "MISSING: ffmpeg-aarch64-apple-darwin"; exit 1; }
          test -f src-tauri/binaries/ffmpeg-x86_64-apple-darwin     || { echo "MISSING: ffmpeg-x86_64-apple-darwin"; exit 1; }
          echo "Sidecar check passed."

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "mixtape v__VERSION__"
          releaseDraft: false
          args: --target universal-apple-darwin

  build-macos-np:
    needs: [build-macos]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2

      - name: Install frontend deps
        run: npm ci

      - name: Build np variant (macOS universal)
        run: npm run tauri build -- --target universal-apple-darwin --config src-tauri/tauri.nopreinstall.conf.json

      - name: Rename and upload np artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG=$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          NP="mixtape_${VERSION}_universal-np.dmg"
          cp "$DMG" "$NP"
          shasum -a 256 "$NP" > "${NP}.sha256"
          gh release upload "v${VERSION}" "$NP" "${NP}.sha256" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install frontend deps
        run: npm ci

      - name: Download sidecars (Windows)
        run: bash scripts/download-sidecars.sh
        shell: bash

      - name: Run Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml -- --test-threads=1

      - name: Verify sidecar files exist
        shell: pwsh
        run: |
          $missing = @()
          if (-not (Test-Path "src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe")) { $missing += "yt-dlp-x86_64-pc-windows-msvc.exe" }
          if (-not (Test-Path "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe")) { $missing += "ffmpeg-x86_64-pc-windows-msvc.exe" }
          if ($missing.Count -gt 0) { Write-Error "MISSING sidecars: $($missing -join ', ')"; exit 1 }
          Write-Host "Sidecar check passed."

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "mixtape v__VERSION__"
          releaseDraft: false

  build-windows-np:
    needs: [build-macos]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install frontend deps
        run: npm ci

      - name: Build np variant (Windows)
        run: npm run tauri build -- --config src-tauri/tauri.nopreinstall.conf.json

      - name: Rename and upload np artifact
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          if (-not $exe) { $exe = Get-ChildItem src-tauri/target/release/bundle/msi/*.msi | Select-Object -First 1 }
          $ext  = $exe.Extension
          $np   = "mixtape_${version}_x64-setup-np${ext}"
          Copy-Item $exe.FullName $np
          $hash = (Get-FileHash $np -Algorithm SHA256).Hash.ToLower()
          "$hash  $np" | Out-File "${np}.sha256" -Encoding utf8
          gh release upload "v${version}" $np "${np}.sha256" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libfuse2 file

      - name: Install frontend deps
        run: npm ci

      - name: Download sidecars (Linux)
        run: bash scripts/download-sidecars.sh

      - name: Run Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml -- --test-threads=1

      - name: Verify sidecar files exist
        run: |
          test -f src-tauri/binaries/yt-dlp-x86_64-unknown-linux-gnu  || { echo "MISSING: yt-dlp-x86_64-unknown-linux-gnu"; exit 1; }
          test -f src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu   || { echo "MISSING: ffmpeg-x86_64-unknown-linux-gnu"; exit 1; }
          echo "Sidecar check passed."

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "mixtape v__VERSION__"
          releaseDraft: false

  build-linux-np:
    needs: [build-macos]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libfuse2 file

      - name: Install frontend deps
        run: npm ci

      - name: Build np variant (Linux)
        run: npm run tauri build -- --config src-tauri/tauri.nopreinstall.conf.json

      - name: Rename and upload np artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          NP="mixtape_${VERSION}_amd64-np.AppImage"
          cp "$APPIMAGE" "$NP"
          sha256sum "$NP" > "${NP}.sha256"
          gh release upload "v${VERSION}" "$NP" "${NP}.sha256" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-distribution:
    runs-on: ubuntu-22.04
    needs: [build-macos-np, build-windows-np, build-linux-np]
    steps:
      - uses: actions/checkout@v6

      - name: Update Homebrew tap
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_URL="https://github.com/Margarets00/mixtape/releases/download/v${VERSION}/mixtape_${VERSION}_universal-np.dmg"
          SHA256=$(curl -fsSL "${DMG_URL}.sha256" | awk '{print $1}')

          git clone "https://x-access-token:${{ secrets.TAP_TOKEN }}@github.com/Margarets00/homebrew-mixtape.git" tap
          sed -i "s/version \".*\"/version \"${VERSION}\"/" tap/Casks/mixtape.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" tap/Casks/mixtape.rb
          cd tap
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add Casks/mixtape.rb
          git diff --cached --quiet || git commit -m "Release v${VERSION}"
          git push
        continue-on-error: true  # Don't fail release if tap update fails

      - name: Update Scoop bucket
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          EXE_URL="https://github.com/Margarets00/mixtape/releases/download/v${VERSION}/mixtape_${VERSION}_x64-setup-np.exe"
          SHA256=$(curl -fsSL "${EXE_URL}.sha256" | awk '{print $1}')

          git clone "https://x-access-token:${{ secrets.TAP_TOKEN }}@github.com/Margarets00/scoop-mixtape.git" bucket
          python3 - <<EOF
          import json, pathlib
          p = pathlib.Path("bucket/bucket/mixtape.json")
          d = json.loads(p.read_text())
          d["version"] = "${VERSION}"
          d["url"] = "${EXE_URL}"
          d["hash"] = "${SHA256}"
          p.write_text(json.dumps(d, indent=2) + "\n")
          EOF
          cd bucket
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add bucket/mixtape.json
          git diff --cached --quiet || git commit -m "Release v${VERSION}"
          git push
        continue-on-error: true  # Don't fail release if bucket update fails
